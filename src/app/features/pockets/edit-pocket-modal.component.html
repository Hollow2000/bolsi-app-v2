    <app-text-input
      label="Nombre"
      [value]="name()"
      (valueChange)="name.set($event)"
    />

    <div class="icon-field">
      <label class="icon-label">Icono</label>
      <app-icon-picker [icons]="icons" [value]="icon()" (valueChange)="icon.set($event)" />
    </div>

    <app-number-input
      label="Porcentaje"
      placeholder="0"
      [min]="0"
      [max]="100"
      [step]="0.5"
      [value]="percentage()"
      (valueChange)="percentage.set($event)"
    />

    @if (errorMessage(); as message) {
      <p class="modal-error" role="alert">{{ message }}</p>
    }

    <div class="modal-actions">
      <button appButton variant="secondary" type="button" (click)="onCancel()">
        Cancelar
      </button>
      <button appButton variant="primary" type="button" (click)="onSave()">
        Guardar cambios
      </button>
    </div>
