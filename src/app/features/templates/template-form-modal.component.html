    <app-text-input
      label="Descripción"
      [value]="description()"
      (valueChange)="description.set($event)"
    />

    <app-number-input
      label="Monto"
      placeholder="0.00"
      [min]="0"
      [value]="amount()"
      (valueChange)="amount.set($event)"
    />

    <div class="icon-field">
      <label class="icon-label">Icono</label>
      <app-icon-picker [icons]="icons" [value]="icon()" (valueChange)="icon.set($event)" />
    </div>

    <app-select-input
      label="Método de pago"
      [valueType]="'number'"
      [value]="paymentMethodId()"
      (valueChange)="paymentMethodId.set($any($event))"
    >
      <option value="0" disabled [selected]="paymentMethodId() === 0">Selecciona un método</option>
      @for (method of paymentMethods(); track method.id) {
        <option [value]="method.id" [selected]="method.id === paymentMethodId()">
          {{ method.name }} ({{ typeLabel(method.type) }})
        </option>
      }
    </app-select-input>

    <app-select-input
      label="Bolsillo"
      [valueType]="'number'"
      [value]="pocketId()"
      (valueChange)="pocketId.set($any($event))"
    >
      <option value="0" disabled [selected]="pocketId() === 0">Selecciona un bolsillo</option>
      @for (pocket of pockets(); track pocket.id) {
        <option [value]="pocket.id" [selected]="pocket.id === pocketId()">
          {{ pocket.name }} ({{ pocket.percentage }}%)
        </option>
      }
    </app-select-input>

    <div class="category-section">
      <label class="category-label">Categoría</label>
      <div class="category-grid">
        @for (cat of categories(); track cat.id) {
          <button
            type="button"
            class="category-chip"
            [class.category-chip--selected]="category() === cat.name"
            (click)="selectCategory(cat)"
          >
            <span class="material-symbols-outlined icon category-chip__icon" aria-hidden="true">{{ cat.icon }}</span>
            <span class="category-chip__name">{{ cat.name }}</span>
          </button>
        }
      </div>
    </div>

    @if (errorMessage(); as message) {
      <p class="modal-error" role="alert">{{ message }}</p>
    }

    <div class="modal-actions">
      <button appButton variant="secondary" type="button" (click)="onCancel()">
        Cancelar
      </button>
      <button appButton variant="primary" type="button" (click)="onSave()">
        {{ template() ? 'Guardar cambios' : 'Crear plantilla' }}
      </button>
    </div>
